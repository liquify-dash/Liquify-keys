<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquify Key System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #020204;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #0a0b10;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 36px 28px;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 30%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .lock-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: all 0.4s ease;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }

    .lock-icon.unlocked {
      background: rgba(16,185,129,0.1);
      border-color: rgba(16,185,129,0.2);
      color: #34d399;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .desc {
      font-size: 0.78rem;
      color: #64748b;
      line-height: 1.4;
    }

    /* Key Box */
    .key-wrap {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s ease;
    }

    .key-wrap.glow {
      border-color: rgba(16,185,129,0.15);
      box-shadow: 0 0 30px -8px rgba(16,185,129,0.1);
    }

    #keyText {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: -0.3px;
      word-break: break-all;
      line-height: 1.5;
      color: #f1f5f9;
      width: 100%;
    }

    #keyText.placeholder {
      color: #475569;
      font-family: inherit;
      font-size: 0.8rem;
    }

    /* Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.04);
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 13px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    button:hover:not(:disabled) {
      background: rgba(255,255,255,0.07);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-main {
      background: linear-gradient(180deg, rgba(59,130,246,0.15), rgba(59,130,246,0.05));
      border-color: rgba(59,130,246,0.2);
      color: #bfdbfe;
    }

    .btn-main:hover:not(:disabled) {
      background: linear-gradient(180deg, rgba(59,130,246,0.25), rgba(59,130,246,0.1));
      border-color: rgba(59,130,246,0.35);
    }

    .btn-generate {
      background: linear-gradient(180deg, rgba(16,185,129,0.15), rgba(16,185,129,0.05));
      border-color: rgba(16,185,129,0.2);
      color: #a7f3d0;
    }

    .btn-generate:hover:not(:disabled) {
      background: linear-gradient(180deg, rgba(16,185,129,0.25), rgba(16,185,129,0.1));
      border-color: rgba(16,185,129,0.35);
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row button { flex: 1; }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #475569;
      min-height: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    .status.working { color: #34d399; }
    .status.expired { color: #f87171; }
    .status.unknown { color: #fbbf24; }

    /* Error / Verify msg */
    .msg {
      text-align: center;
      font-size: 0.78rem;
      color: #f87171;
      margin-top: 12px;
      min-height: 18px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .msg.show { opacity: 1; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0f111a;
      border: 1px solid rgba(255,255,255,0.06);
      color: #e2e8f0;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      z-index: 100;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>

        "a1kwJnZaZw0wTm1PK1xjhEhEDoZmgCYyH0dLJQsOCiMPEWNORx8H"
      ];

      function decrypt(enc, idx) {
        const salt = "lq" + String(idx).padStart(3, "0");
        const shift = (idx % 12) + 2;
        try {
          let a = atob(enc);
          let b = a.split("").reverse().join("");
          let u = "", r = "";
          for (let i = 0; i < b.length; i++) u += String.fromCharCode((b.charCodeAt(i) - shift + 256) % 256);
          for (let i = 0; i < u.length; i++) r += String.fromCharCode(u.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
          return r;
        } catch(e) { return "error"; }
      }

      // State
      let currentKey = null;
      let keyUsed = false;
      let statuses = JSON.parse(localStorage.getItem(STORE.status) || "{}");

      // DOM
      const el = {
        lock: document.getElementById("lockIcon"),
        desc: document.getElementById("descText"),
        keyWrap: document.getElementById("keyWrap"),
        keyText: document.getElementById("keyText"),
        gateView: document.getElementById("gateView"),
        keyView: document.getElementById("keyView"),
        genBtn: document.getElementById("genBtn"),
        copyBtn: document.getElementById("copyBtn"),
        checkBtn: document.getElementById("checkBtn"),
        statusRow: document.getElementById("statusRow"),
        msg: document.getElementById("msg"),
        toast: document.getElementById("toast")
      };

      // Verify gate on load
      function verifyGate() {
        const pending = sessionStorage.getItem("lq_pending");
        if (!pending) return false;
        
        const start = parseInt(pending, 10);
        const elapsed = Date.now() - start;
        const ref = document.referrer;
        
        // Must have spent minimum time AND come from Linkvertise domain
        const fromLV = /linkvertise|link-target|link-to\.net/i.test(ref);
        const enoughTime = elapsed >= MIN_TIME;
        
        if (fromLV && enoughTime) {
          sessionStorage.removeItem("lq_pending");
          localStorage.setItem(STORE.gate, "1");
          return true;
        }
        
        if (elapsed > 300000) { // 5 min timeout
          sessionStorage.removeItem("lq_pending");
        }
        return false;
      }

      function isOpen() { return localStorage.getItem(STORE.gate) === "1"; }
      function closeGate() { localStorage.removeItem(STORE.gate); }

      function showToast(m) {
        el.toast.textContent = m;
        el.toast.classList.add("show");
        setTimeout(() => el.toast.classList.remove("show"), 2000);
      }

      function showMsg(m) {
        el.msg.textContent = m;
        el.msg.classList.add("show");
        setTimeout(() => el.msg.classList.remove("show"), 4000);
      }

      function updateUI() {
        const open = isOpen();
        if (open) {
          el.lock.textContent = "🔓";
          el.lock.classList.add("unlocked");
          el.desc.textContent = "Gate open — generate your key below";
          el.gateView.style.display = "none";
          el.keyView.style.display = "flex";
          if (keyUsed) {
            el.genBtn.disabled = true;
            el.genBtn.textContent = "Generated";
            el.keyText.textContent = "Renew gate to generate another";
            el.keyText.className = "placeholder";
            el.keyWrap.classList.remove("glow");
          } else {
            el.genBtn.disabled = false;
            el.genBtn.textContent = "Generate Key";
          }
        } else {
          el.lock.textContent = "🔒";
          el.lock.classList.remove("unlocked");
          el.desc.textContent = "Complete the Linkvertise gate to generate a key";
          el.gateView.style.display = "flex";
          el.keyView.style.display = "none";
          keyUsed = false;
          currentKey = null;
          el.copyBtn.disabled = true;
          el.checkBtn.disabled = true;
          el.statusRow.innerHTML = "";
          el.statusRow.className = "status";
        }
      }

      // Gate actions
      function goToGate() {
        sessionStorage.setItem("lq_pending", Date.now().toString());
        window.location.href = LINKVERTISE;
      }

      function renewGate() {
        closeGate();
        showToast("Renewing gate...");
        setTimeout(goToGate, 600);
      }

      // Key actions
      function generate() {
        if (!isOpen() || keyUsed) return;
        const idx = Math.floor(Math.random() * encryptedKeys.length);
        currentKey = decrypt(encryptedKeys[idx], idx);
        
        // Scramble
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-";
        let it = 0;
        el.keyText.classList.remove("placeholder");
        el.keyWrap.classList.add("glow");
        
        const iv = setInterval(() => {
          el.keyText.textContent = currentKey.split("").map((c, i) => 
            i < it ? c : chars[Math.floor(Math.random() * chars.length)]
          ).join("");
          it += 1.5;
          if (it >= currentKey.length) {
            clearInterval(iv);
            el.keyText.textContent = currentKey;
          }
        }, 18);

        keyUsed = true;
        el.copyBtn.disabled = false;
        el.checkBtn.disabled = false;
        updateUI();
        showToast("Key generated");
      }

      function copyKey() {
        if (!currentKey) return;
        navigator.clipboard.writeText(currentKey).then(() => showToast("Copied"))
          .catch(() => {
            const t = document.createElement("textarea");
            t.value = currentKey;
            document.body.appendChild(t);
            t.select();
            document.execCommand("copy");
            document.body.removeChild(t);
            showToast("Copied");
          });
      }

      function checkStatus() {
        if (!currentKey) return;
        el.checkBtn.disabled = true;
        el.checkBtn.innerHTML = "<span style='display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.1);border-top-color:currentColor;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;'></span>Checking";
        
        setTimeout(() => {
          const h = currentKey.split("").reduce((a,c) => ((a<<5)-a+c.charCodeAt(0))|0, 0);
          const st = Math.abs(h) % 3 === 0 ? "working" : Math.abs(h) % 3 === 1 ? "expired" : "unknown";
          statuses[currentKey] = st;
          localStorage.setItem(STORE.status, JSON.stringify(statuses));
          
          el.statusRow.className = "status " + st;
          el.statusRow.innerHTML = `<div class="status-dot"></div><span>${st === "working" ? "Working" : st === "expired" ? "Not Working" : "Unknown"}</span>`;
          
          el.checkBtn.innerHTML = "Check";
          el.checkBtn.disabled = false;
          showToast(st === "working" ? "Status: Working" : st === "expired" ? "Status: Not Working" : "Status: Unknown");
        }, 900);
      }

      // Events
      document.getElementById("gateBtn").addEventListener("click", goToGate);
      document.getElementById("renewBtn").addEventListener("click", renewGate);
      el.genBtn.addEventListener("click", generate);
      el.copyBtn.addEventListener("click", copyKey);
      el.checkBtn.addEventListener("click", checkStatus);

      // Init
      if (verifyGate()) {
        showToast("Gate verified — you're in");
      } else if (sessionStorage.getItem("lq_pending") && !isOpen()) {
        showMsg("Gate not verified. Complete Linkvertise fully and return.");
        sessionStorage.removeItem("lq_pending");
      }
      
      updateUI();
    })();
  </script>
</body>
</html>
