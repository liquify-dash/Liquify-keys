      color: #8b9bb0;
    }

        let a = atob(enc);
        let b = reverseStr(a);
        let c = atob(b);
        let unshifted = "";
        for (let i = 0; i < c.length; i++) unshifted += String.fromCharCode(c.charCodeAt(i) - SHIFT);
        let result = "";
        for (let i = 0; i < unshifted.length; i++) result += String.fromCharCode(unshifted.charCodeAt(i) ^ SALT.charCodeAt(i % SALT.length));
        return result;
      } catch(e) { return "liquify-12hour-ready"; }
    }

    const STORAGE_KEY = "liquify_last_gen";
    const COOLDOWN_MS = 12 * 60 * 60 * 1000;

    let currentKey = null;

    function canGenerate() {
      const last = localStorage.getItem(STORAGE_KEY);
      if (!last) return true;
      return (Date.now() - parseInt(last)) >= COOLDOWN_MS;
    }

      const last = localStorage.getItem(STORAGE_KEY);
      if (!last) return 0;
      const elapsed = Date.now() - parseInt(last);
      if (elapsed >= COOLDOWN_MS) return 0;
      return COOLDOWN_MS - elapsed;
    }

    function formatTime(ms) {
      if (ms <= 0) return "ready";
      const hours = Math.floor(ms / (60 * 60 * 1000));
      const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
      const seconds = Math.floor((ms % (60 * 1000)) / 1000);
      if (hours > 0) return `${hours}h ${minutes}m`;
      if (minutes > 0) return `${minutes}m ${seconds}s`;
      return `${seconds}s`;
    }

    function updateUI() {
      const btn = document.getElementById("generateBtn");
      const timerSpan = document.getElementById("timerLabel");
      if (canGenerate()) {
        btn.disabled = false;
        timerSpan.innerText = "ready";
        timerSpan.style.color = "#2c6e2c";
      } else {
        btn.disabled = true;
        const remaining = getRemainingTime();
        timerSpan.innerText = `cooldown · ${formatTime(remaining)}`;
        timerSpan.style.color = "#a1622b";
      }
    }

    function generateAndDisplay() {
      if (!canGenerate()) {
        updateUI();
        return;
      }
      const randomIndex = Math.floor(Math.random() * keyPool.length);
      currentKey = keyPool[randomIndex];
      document.getElementById("keyDisplay").innerText = currentKey;
      localStorage.setItem(STORAGE_KEY, Date.now().toString());
      updateUI();
    }

    function startTimerLoop() {
      updateUI();
      setInterval(() => updateUI(), 1000);
    }

    document.getElementById("generateBtn").addEventListener("click", generateAndDisplay);
    startTimerLoop();
