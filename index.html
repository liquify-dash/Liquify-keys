<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquify · 12 Hour Key System</title>
  <style>
    :root {
      --bg: #05060a;
      --surface: #0d0f17;
      --border: rgba(255,255,255,0.06);
      --text: #e8eaf6;
      --muted: #6b7280;
      --accent: #10b981;
      --accent-dim: rgba(16,185,129,0.1);
      --error: #ef4444;
      --error-dim: rgba(239,68,68,0.1);
      --warning: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5) inset, 0 20px 50px -10px rgba(0,0,0,0.5);
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), #059669);
      border-radius: 12px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 24px -8px rgba(16,185,129,0.4);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* Gate Status */
    .gate-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .gate-status.locked {
      background: var(--error-dim);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    .gate-status.unlocked {
      background: var(--accent-dim);
      border: 1px solid rgba(16,185,129,0.2);
      color: #6ee7b7;
    }

    .gate-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 8px currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Key Display */
    .key-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .key-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(16,185,129,0.08), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .key-box.active::before {
      opacity: 1;
    }

    #keyDisplay {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: -0.2px;
      word-break: break-all;
      line-height: 1.4;
      color: var(--text);
      position: relative;
      z-index: 1;
    }

    #keyDisplay.placeholder {
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    button:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.05));
      border-color: rgba(16,185,129,0.25);
      color: #d1fae5;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(16,185,129,0.25), rgba(16,185,129,0.1));
      border-color: rgba(16,185,129,0.4);
      box-shadow: 0 8px 24px -8px rgba(16,185,129,0.3);
    }

    .btn-gate {
      background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(59,130,246,0.05));
      border-color: rgba(59,130,246,0.25);
      color: #dbeafe;
    }

    .btn-gate:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(59,130,246,0.1));
      border-color: rgba(59,130,246,0.4);
      box-shadow: 0 8px 24px -8px rgba(59,130,246,0.3);
    }

    .btn-secondary {
      background: transparent;
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      min-height: 24px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateY(4px);
      transition: all 0.3s ease;
    }

    .status-badge.show {
      opacity: 1;
      transform: translateY(0);
    }

    .status-badge.working {
      background: rgba(16,185,129,0.1);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.2);
    }

    .status-badge.expired {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }

    .status-badge.unknown {
      background: rgba(245,158,11,0.1);
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,0.2);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(13,15,23,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      z-index: 100;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Loading */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

      // Decrypt function
      function decrypt(enc, idx) {
        const salt = "lq" + String(idx).padStart(3, "0");
        const shift = (idx % 12) + 2;
        try {
          let a = atob(enc);
          let b = a.split("").reverse().join("");
          let unshifted = "";
          for (let i = 0; i < b.length; i++) {
            unshifted += String.fromCharCode((b.charCodeAt(i) - shift + 256) % 256);
          }
          let result = "";
          for (let i = 0; i < unshifted.length; i++) {
            result += String.fromCharCode(unshifted.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
          }
          return result;
        } catch(e) { return "error"; }
      }

      // State
      let currentKey = null;
      let keyUsed = false;
      let statuses = JSON.parse(localStorage.getItem(STATUS_KEY) || "{}");

      // DOM refs
      const gateStatus = document.getElementById("gateStatus");
      const gateActions = document.getElementById("gateActions");
      const keyActions = document.getElementById("keyActions");
      const keyDisplay = document.getElementById("keyDisplay");
      const keyBox = document.getElementById("keyBox");
      const generateBtn = document.getElementById("generateBtn");
      const copyBtn = document.getElementById("copyBtn");
      const checkBtn = document.getElementById("checkBtn");
      const statusBadge = document.getElementById("statusBadge");
      const statusText = document.getElementById("statusText");
      const toast = document.getElementById("toast");

      // Check gate state
      function isGateOpen() {
        return localStorage.getItem(GATE_KEY) === "1";
      }

      function openGate() {
        localStorage.setItem(GATE_KEY, "1");
      }

      function closeGate() {
        localStorage.removeItem(GATE_KEY);
      }

      function updateUI() {
        if (isGateOpen()) {
          gateStatus.className = "gate-status unlocked";
          gateStatus.innerHTML = "<span>Gate Open</span><div class='gate-dot'></div>";
          gateActions.style.display = "none";
          keyActions.style.display = "flex";
          if (keyUsed) {
            generateBtn.disabled = true;
            generateBtn.textContent = "Key Generated";
            keyDisplay.textContent = "Renew gate to generate another key";
            keyDisplay.className = "placeholder";
            keyBox.classList.remove("active");
          } else {
            generateBtn.disabled = false;
            generateBtn.textContent = "Generate Key";
          }
        } else {
          gateStatus.className = "gate-status locked";
          gateStatus.innerHTML = "<span>Gate Required</span><div class='gate-dot'></div>";
          gateActions.style.display = "flex";
          keyActions.style.display = "none";
          keyUsed = false;
        }
      }

      // Toast
      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Generate key
      function generateKey() {
        if (!isGateOpen() || keyUsed) return;
        
        const idx = Math.floor(Math.random() * encryptedKeys.length);
        currentKey = decrypt(encryptedKeys[idx], idx);
        
        // Scramble animation
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-";
        let iter = 0;
        keyDisplay.classList.remove("placeholder");
        keyBox.classList.add("active");
        
        const interval = setInterval(() => {
          keyDisplay.textContent = currentKey.split("").map((c, i) => {
            return i < iter ? c : chars[Math.floor(Math.random() * chars.length)];
          }).join("");
          iter += 2;
          if (iter >= currentKey.length) {
            clearInterval(interval);
            keyDisplay.textContent = currentKey;
          }
        }, 20);

        keyUsed = true;
        copyBtn.disabled = false;
        checkBtn.disabled = false;
        statusBadge.classList.remove("show");
        updateUI();
        showToast("Key generated");
      }

      // Copy
      function copyKey() {
        if (!currentKey) return;
        navigator.clipboard.writeText(currentKey).then(() => {
          showToast("Copied to clipboard");
        }).catch(() => {
          const ta = document.createElement("textarea");
          ta.value = currentKey;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          showToast("Copied to clipboard");
        });
      }

      // Check status
      function checkStatus() {
        if (!currentKey) return;
        checkBtn.disabled = true;
        checkBtn.innerHTML = "<span class='spinner'></span>Checking...";
        
        setTimeout(() => {
          const hash = currentKey.split("").reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
          const mod = Math.abs(hash) % 3;
          const status = mod === 0 ? "working" : mod === 1 ? "expired" : "unknown";
          
          statuses[currentKey] = status;
          localStorage.setItem(STATUS_KEY, JSON.stringify(statuses));
          
          statusBadge.className = "status-badge " + status;
          statusText.textContent = status === "working" ? "Working" : status === "expired" ? "Not Working" : "Unknown";
          statusBadge.classList.add("show");
          
          checkBtn.innerHTML = "Check";
          checkBtn.disabled = false;
          
          const msgs = { working: "Status: Working", expired: "Status: Not Working", unknown: "Status: Unknown" };
          showToast(msgs[status]);
        }, 800);
      }

      // Go to gate
      function goToGate() {
        // Set a flag to auto-open on return
        sessionStorage.setItem("lq_returning", "1");
        window.location.href = LINKVERTISE_URL;
      }

      // Renew gate
      function renewGate() {
        closeGate();
        keyUsed = false;
        currentKey = null;
        copyBtn.disabled = true;
        checkBtn.disabled = true;
        statusBadge.classList.remove("show");
        updateUI();
        showToast("Gate closed — redirecting...");
        setTimeout(goToGate, 800);
      }

      // Check if returning from Linkvertise
      if (sessionStorage.getItem("lq_returning") === "1") {
        sessionStorage.removeItem("lq_returning");
        openGate();
        showToast("Gate completed");
      }

      // Event listeners
      document.getElementById("goToGateBtn").addEventListener("click", goToGate);
      document.getElementById("renewBtn").addEventListener("click", renewGate);
      generateBtn.addEventListener("click", generateKey);
      copyBtn.addEventListener("click", copyKey);
      checkBtn.addEventListener("click", checkStatus);

      // Init
      updateUI();
    })();
  </script>
