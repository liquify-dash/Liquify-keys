      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {

      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      padding: 2rem 1.8rem;

      width: 100%;
      border: 1px solid #242836;
    }

      text-align: center;
      margin-bottom: 1.8rem;
    }

      font-weight: 550;
      color: #eef3ff;
      letter-spacing: -0.2px;
    }

      font-size: 0.75rem;
      color: #7e849c;
      margin-top: 6px;
    }

      border-radius: 24px;
      padding: 6px;
      margin: 20px 0 20px;
      border: 1px solid #262b3e;
    }

      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      word-break: break-all;
      background: #07090f;
      padding: 18px 14px;
      border-radius: 20px;
      color: #cbd5ff;
      letter-spacing: 0.2px;
      text-align: center;
    }

    button {
      background: #1f253c;
      border: none;
      width: 100%;
      padding: 13px 0;
      border-radius: 60px;
      font-weight: 520;
      font-size: 0.9rem;
      color: #f0f3ff;
      cursor: pointer;
      transition: 0.2s ease;
      font-family: inherit;
      border: 0.5px solid #2f3552;
    }

    button:hover:not(:disabled) {
      background: #2c3350;
      transform: scale(0.98);
    }

    button:active:not(:disabled) {
      transform: scale(0.96);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #1e212e;
    }

    .status {
      font-size: 0.7rem;
      color: #6f7893;
      background: #191d2a;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .timer {
      font-size: 0.7rem;
      color: #9ea5c2;
      background: #191d2a;
      padding: 5px 12px;
      border-radius: 40px;
      font-family: monospace;
    }

    .ready-txt { color: #7cd68e; }
    .wait-txt { color: #e0a56b; }
  </style>

    const SALT = "liquify";
    const SHIFT = 7;

    function reverseStr(s) {
      return s.split('').reverse().join('');
    }

    function decrypt(enc) {
      try {
        let a = atob(enc);
        let b = reverseStr(a);
        let c = atob(b);
        let unshifted = "";
        for (let i = 0; i < c.length; i++) {
          unshifted += String.fromCharCode(c.charCodeAt(i) - SHIFT);
        }
        let result = "";
        for (let i = 0; i < unshifted.length; i++) {
          result += String.fromCharCode(unshifted.charCodeAt(i) ^ SALT.charCodeAt(i % SALT.length));
        }
        return result;
      } catch(e) {
        return "liquify-12hour-error";
      }
    }

    // Cooldown setup (12 hours)

    const COOLDOWN_MS = 12 * 60 * 60 * 1000;

    let currentKey = null;

    function canGenerate() {
      const last = localStorage.getItem(STORAGE_KEY);
      if (!last) return true;
      return (Date.now() - parseInt(last)) >= COOLDOWN_MS;
    }

    function getRemainingTime() {
      const last = localStorage.getItem(STORAGE_KEY);
      if (!last) return 0;
      const elapsed = Date.now() - parseInt(last);
      if (elapsed >= COOLDOWN_MS) return 0;
      return COOLDOWN_MS - elapsed;
    }

      const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
      const seconds = Math.floor((ms % (60 * 1000)) / 1000);
      if (hours > 0) return `${hours}h ${minutes}m`;
      if (minutes > 0) return `${minutes}m ${seconds}s`;
      return `${seconds}s`;
    }

        statusSpan.style.color = "#7cd68e";
      } else {
        btn.disabled = true;
        const remaining = getRemainingTime();
        timerSpan.innerHTML = `${formatTime(remaining)}`;
        timerSpan.classList.add("wait-txt");
        timerSpan.classList.remove("ready-txt");
        statusSpan.innerHTML = "● cooldown";
        statusSpan.style.color = "#e0a56b";
      }
    }

    function generateAndDisplay() {
      if (!canGenerate()) {
        updateUI();
        return;
      }
      const randomIndex = Math.floor(Math.random() * keyPool.length);
      currentKey = keyPool[randomIndex];
      document.getElementById("keyDisplay").innerText = currentKey;
      localStorage.setItem(STORAGE_KEY, Date.now().toString());
      updateUI();

      // Update status to show success briefly
      const statusSpan = document.getElementById("statusLabel");
      statusSpan.innerHTML = "✓ key generated";
      statusSpan.style.color = "#7cd68e";
      setTimeout(() => {
        if (canGenerate()) {
          statusSpan.innerHTML = "● ready";
        } else {
          statusSpan.innerHTML = "● cooldown";
        }
      }, 2000);
    }

    function startTimerLoop() {
      updateUI();
      setInterval(() => updateUI(), 1000);
    }

    document.getElementById("generateBtn").addEventListener("click", generateAndDisplay);
    startTimerLoop();
  })();
</script>
</body>
</html>
