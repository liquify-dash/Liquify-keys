<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Liquidify Key</title>
  <style>
    body {
      background: #0f0f14;
      color: #e0e0e0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h2 { color: #7ab4ff; }
    #key {
      background: #1a1a24;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 1.4rem;
      border: 1px solid #333;
      letter-spacing: 2px;
      margin: 16px 0;
    }
    button {
      background: #3a7acd;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h2>🔑 Your Liquidify Key</h2>
  <p>Copy this key and paste it in-game:</p>
  <div id="key">Loading...</div>
  <button onclick="copyKey()">Copy Key</button>

  <script>
    // ✏️ Add all your keys here
    const keys = [
      "liquidify-X9mK2pQvR7nL4wYc",
      "liquidify-Bz5tJhN3sWqA8dEf",
      "liquidify-Uc6rGmP1oVxK9yTn",
      "liquidify-Fw4iDlZ8eHbS2jMq",
      "liquidify-Rk7aNv0uCpXt5gYw",
      "liquidify-Qe3mLhJ6fBzW1sDi",
      "liquidify-Yt9cKpR4nMvG7xAo",
      "liquidify-Hs2wEjU8bTqN5lZf",
      "liquidify-Vm6dXoC3yPkF1rBn",
      "liquidify-Aj8gWtH5zQeL4mUi"
    ];

    // Pick a random key and show it
    const chosen = keys[Math.floor(Math.random() * keys.length)];
    document.getElementById("key").innerText = chosen;

    function copyKey() {
      navigator.clipboard.writeText(chosen);
      document.querySelector("button").innerText = "Copied!";
    }
  </script>
</body>
</html>
